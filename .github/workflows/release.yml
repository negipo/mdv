name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '25.8.1'

      - name: Install xcodegen and create-dmg
        run: brew install xcodegen create-dmg

      - name: Calculate CalVer tag
        id: calver
        run: |
          TODAY=$(date -u +"%Y.%m.%d")
          PREFIX="v${TODAY}."
          LAST_SEQ=$(git tag -l "${PREFIX}*" | while read -r tag; do echo "${tag#${PREFIX}}"; done | sort -n | tail -1)
          if [ -z "$LAST_SEQ" ]; then
            SEQ=1
          else
            SEQ=$((LAST_SEQ + 1))
          fi
          TAG="${PREFIX}${SEQ}"
          VERSION="${TODAY}.${SEQ}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: scripts/build.sh
        env:
          CI: 'true'
          VERSION: ${{ steps.calver.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Create release
        run: |
          gh release create ${{ steps.calver.outputs.tag }} \
            mdv-${{ steps.calver.outputs.version }}-macos.dmg \
            --generate-notes \
            --target ${{ github.sha }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Dispatch to homebrew-tap
        run: |
          DMG_NAME="mdv-${{ steps.calver.outputs.version }}-macos.dmg"
          SHA256=$(shasum -a 256 "$DMG_NAME" | awk '{print $1}')
          gh api repos/negipo/homebrew-tap/dispatches \
            --field event_type=update-mdv \
            --field client_payload[version]="${{ steps.calver.outputs.version }}" \
            --field client_payload[sha256]="$SHA256"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
