name: mdv
options:
  bundleIdPrefix: com.negipo
  deploymentTarget:
    macOS: "14.0"
targets:
  mdv:
    type: application
    platform: macOS
    sources:
      - path: mdv
        excludes:
          - Resources
      - path: mdv/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.negipo.mdv
        INFOPLIST_FILE: mdv/Info.plist
        CODE_SIGN_ENTITLEMENTS: mdv/mdv.entitlements
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_NAME: mdv
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        CURRENT_PROJECT_VERSION: ${CURRENT_PROJECT_VERSION}
    preBuildScripts:
      - name: Build JS Bundle
        script: |
          cd "$SRCROOT"
          if command -v npm &> /dev/null; then
            npm run build:js
          fi
        inputFiles:
          - $(SRCROOT)/js/renderer.ts
          - $(SRCROOT)/js/markdown.ts
        outputFiles:
          - $(SRCROOT)/mdv/Resources/renderer.js
    postBuildScripts:
      - name: Copy CLI wrapper
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin"
          cp "${SRCROOT}/resources/bin/mdv" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/mdv"
          chmod +x "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/mdv"
  mdvTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: mdvTests
    dependencies:
      - target: mdv
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/mdv.app/Contents/MacOS/mdv"
        GENERATE_INFOPLIST_FILE: "YES"
